<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Tax Checker</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Playfair+Display:wght@400;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:       #f0f2f5;
      --surface:  #ffffff;
      --border:   #e2e5ea;
      --text:     #1a1d23;
      --muted:    #6b7280;
      --green:    #15803d;
      --green-bg: #dcfce7;
      --amber:    #b45309;
      --amber-bg: #fef3c7;
      --radius:   8px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.5;
      padding: 2rem 1rem;
      max-width: 640px;
      margin: 0 auto;
    }

    h1 {
      font-family: 'Playfair Display', Georgia, serif;
      font-size: 2.5rem;
      font-weight: 700;
      line-height: 1.15;
      margin-bottom: 0.75rem;
    }

    h2 {
      font-family: 'Playfair Display', Georgia, serif;
      font-size: 1.1rem;
      font-weight: 700;
      margin-bottom: 1rem;
    }

    header {
      background: var(--text);
      color: #fff;
      padding: 1.5rem;
      margin: -2rem -1rem 1.75rem;
      border-radius: 0 0 var(--radius) var(--radius);
    }

    header h1 { color: #fff; margin-bottom: 0.6rem; }

    .disclaimer {
      font-size: 0.8125rem;
      color: rgba(255, 255, 255, 0.6);
      margin-bottom: 0;
      padding-bottom: 0;
      border-bottom: none;
    }

    .disclaimer a { color: rgba(255, 255, 255, 0.85); }

    .add-form {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem;
      margin-bottom: 1rem;
    }

    .form-row {
      display: flex;
      gap: 0.75rem;
      margin-bottom: 0.75rem;
    }

    .form-row label {
      display: flex;
      flex-direction: column;
      gap: 0.3rem;
      font-size: 0.6875rem;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--muted);
      flex: 1;
    }

    .form-row input {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 0.9375rem;
      padding: 0.5rem 0.625rem;
      border: 1px solid var(--border);
      border-radius: calc(var(--radius) - 2px);
      background: var(--bg);
      color: var(--text);
      width: 100%;
      transition: border-color 0.15s;
    }

    input[type=number]::-webkit-outer-spin-button,
    input[type=number]::-webkit-inner-spin-button { -webkit-appearance: none; }
    input[type=number] { -moz-appearance: textfield; }

    .form-row input:focus { outline: none; border-color: var(--text); }
    .form-row input:focus-visible { outline: 2px solid var(--text); outline-offset: 2px; }

    .form-error {
      font-size: 0.8125rem;
      color: var(--amber);
      margin-bottom: 0.5rem;
    }

    .btn-primary {
      display: block;
      width: 100%;
      padding: 0.75rem;
      background: var(--text);
      color: #fff;
      border: none;
      border-radius: var(--radius);
      font-size: 0.9375rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s;
    }

    .btn-primary:hover { opacity: 0.82; }
    .btn-primary:focus-visible { outline: 2px solid var(--text); outline-offset: 2px; }

    .job-card {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 1rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 0.875rem 1rem;
      margin-bottom: 0.5rem;
    }

    .job-card-body { flex: 1; min-width: 0; }

    .job-name {
      font-weight: 600;
      font-size: 0.9375rem;
      margin-bottom: 0.5rem;
    }

    .job-fields { display: flex; gap: 1.5rem; flex-wrap: wrap; }

    .job-field { display: flex; flex-direction: column; gap: 0.2rem; }

    .field-label {
      font-size: 0.6875rem;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .job-card--editing { border-color: var(--text); }

    .job-actions {
      display: flex;
      flex-direction: column;
      gap: 0.4rem;
      flex-shrink: 0;
    }

    .edit-btn, .remove-btn {
      font-size: 0.8125rem;
      color: var(--muted);
      background: none;
      border: 1px solid var(--border);
      border-radius: calc(var(--radius) - 2px);
      padding: 0.3rem 0.6rem;
      cursor: pointer;
      transition: color 0.15s, border-color 0.15s;
      width: 100%;
      text-align: center;
    }

    .edit-btn:hover, .remove-btn:hover { color: var(--text); border-color: var(--text); }
    .edit-btn:focus-visible, .remove-btn:focus-visible { outline: 2px solid var(--text); outline-offset: 2px; }

    .btn-save {
      font-size: 0.8125rem;
      font-weight: 600;
      color: #fff;
      background: var(--text);
      border: 1px solid var(--text);
      border-radius: calc(var(--radius) - 2px);
      padding: 0.3rem 0.6rem;
      cursor: pointer;
      width: 100%;
      text-align: center;
      transition: opacity 0.15s;
    }

    .btn-save:hover { opacity: 0.82; }
    .btn-save:focus-visible { outline: 2px solid var(--text); outline-offset: 2px; }

    .empty-state {
      text-align: center;
      color: var(--muted);
      font-style: italic;
      font-size: 0.9375rem;
      padding: 2rem 0;
    }

    #calc-btn { margin-top: 1rem; }

    .result-card {
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.5rem;
      margin-top: 1.5rem;
      background: var(--surface);
    }

    .result-card.green { background: var(--green-bg); border-color: #86efac; }
    .result-card.amber { background: var(--amber-bg); border-color: #fcd34d; }

    .result-label {
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 0.5rem;
    }

    .result-card hr { border: none; border-top: 1px solid var(--border); margin: 0.75rem 0; }

    .result-figure {
      font-family: 'Playfair Display', Georgia, serif;
      font-size: 1.75rem;
      font-weight: 700;
      line-height: 1;
      margin-bottom: 0.5rem;
    }

    .result-card.green .result-figure { color: var(--green); }
    .result-card.amber .result-figure { color: var(--amber); }

    .result-verdict { font-size: 0.9375rem; margin-bottom: 1.25rem; }

    .result-breakdown {
      border-top: 1px solid var(--border);
      padding-top: 1rem;
      margin-bottom: 1rem;
    }

    .breakdown-row {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      font-size: 0.9375rem;
      padding: 0.3rem 0;
    }

    .breakdown-row span:first-child { color: var(--muted); }

    .result-card ul {
      font-size: 0.875rem;
      padding-left: 1.25rem;
      margin-bottom: 1rem;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }

    .result-footer {
      font-size: 0.8125rem;
      color: var(--muted);
      border-top: 1px solid var(--border);
      padding-top: 0.75rem;
      margin-top: 0.75rem;
    }

    .result-footer a { color: var(--text); }

    /* Info icon + tooltip */
    .info-wrap {
      position: relative;
      display: inline-flex;
      align-items: center;
      vertical-align: middle;
      margin-left: 0.2rem;
    }

    .info-btn {
      width: 0.9rem;
      height: 0.9rem;
      border-radius: 50%;
      background: var(--border);
      color: var(--muted);
      border: none;
      font-size: 0.5625rem;
      font-style: italic;
      font-weight: 700;
      font-family: Georgia, serif;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 0;
      line-height: 1;
      flex-shrink: 0;
      transition: background 0.15s, color 0.15s;
    }

    .form-row label > span:hover .info-btn,
    .info-btn:focus { background: var(--text); color: #fff; outline: none; }
    .info-btn:focus-visible { outline: 2px solid var(--text); outline-offset: 2px; }

    .tooltip {
      position: absolute;
      bottom: calc(100% + 5px);
      left: 50%;
      transform: translateX(-50%);
      background: rgba(75, 82, 95, 0.92);
      color: #fff;
      font-size: 0.6875rem;
      font-weight: 400;
      letter-spacing: 0;
      text-transform: none;
      width: max-content;
      max-width: min(280px, calc(100vw - 2rem));
      white-space: normal;
      padding: 0.35rem 0.6rem;
      border-radius: calc(var(--radius) - 2px);
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.12s;
      z-index: 20;
    }

    .tooltip.show { opacity: 1; }

    @media (max-width: 480px) {
      .form-row { flex-direction: column; }
      .job-fields { gap: 0.75rem; }
      h1 { font-size: 1.625rem; }
      .result-figure { font-size: 1.5rem; }
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after { transition: none !important; }
    }
  </style>
</head>
<body>
  <header>
    <h1>Tax Overpayment Checker</h1>
    <p class="disclaimer"><strong>Estimate only — not tax advice.</strong> Income tax only (no NI or student loan). England, Wales &amp; Northern Ireland rules. Always verify against <a href="https://www.gov.uk/check-income-tax-current-year" target="_blank">your HMRC personal tax account</a>.</p>
  </header>

  <main>
    <section class="add-form">
      <h2 id="form-heading">Add a job</h2>
      <div class="form-row">
        <label>Job name (optional)<input id="draft-name" type="text" placeholder="e.g. Company or Title"></label>
      </div>
      <div class="form-row">
        <label><span>Gross pay (£)<span class="info-wrap"><button type="button" class="info-btn" aria-label="Gross pay information" aria-describedby="tip-gross">i</button><span id="tip-gross" class="tooltip" role="tooltip">Your total pay for the year — from your P60, P45, or payslip.</span></span></span><input id="draft-gross" type="number" min="0" placeholder="7500" aria-describedby="tip-gross"></label>
        <label><span>Tax deducted (£)<span class="info-wrap"><button type="button" class="info-btn" aria-label="Tax deducted information" aria-describedby="tip-tax">i</button><span id="tip-tax" class="tooltip" role="tooltip">Total tax taken this year — from your P60, P45, or payslip.</span></span></span><input id="draft-tax" type="number" min="0" placeholder="870" aria-describedby="tip-tax"></label>
        <label><span>Tax code<span class="info-wrap"><button type="button" class="info-btn" aria-label="Tax code information" aria-describedby="tip-code">i</button><span id="tip-code" class="tooltip" role="tooltip">e.g. 1257L or BR — on your payslip, P60, or P45.</span></span></span><input id="draft-code" type="text" placeholder="1257L" aria-describedby="tip-code"></label>
      </div>
      <p id="form-error" class="form-error" hidden aria-live="polite"></p>
      <button id="add-btn" class="btn-primary" onclick="addJob()">+ Add job</button>
    </section>

    <div id="jobs-list"></div>

    <button id="calc-btn" class="btn-primary" onclick="calculate()" hidden>Calculate</button>

    <div id="result" aria-live="polite"></div>
  </main>

  <script>
    const TAX_YEAR = {
      personalAllowance: 12570,
      bands: [
        { upTo: 50270,    rate: 0.20 },
        { upTo: 125140,   rate: 0.40 },
        { upTo: Infinity, rate: 0.45 }
      ]
    };

    function correctTax(totalIncome) {
      let taxable = Math.max(0, totalIncome - TAX_YEAR.personalAllowance);
      let tax = 0;
      let lowerBound = TAX_YEAR.personalAllowance;
      for (const band of TAX_YEAR.bands) {
        if (taxable <= 0) break;
        const bandWidth = band.upTo - lowerBound;
        const slice = Math.min(taxable, bandWidth);
        tax += slice * band.rate;
        taxable -= slice;
        lowerBound = band.upTo;
      }
      return tax;
    }

    function checkTax(jobs) {
      const totalIncome   = jobs.reduce((sum, j) => sum + j.grossPay, 0);
      const totalDeducted = jobs.reduce((sum, j) => sum + j.taxDeducted, 0);
      const due           = correctTax(totalIncome);
      const difference    = totalDeducted - due;
      return { totalIncome, totalDeducted, due, difference };
    }

    let jobs = [];
    let editingId = null;

    function generateId() {
      return Date.now().toString(36) + Math.random().toString(36).slice(2);
    }

    function jobLabel(job) {
      return job.name || ('Job ' + (jobs.indexOf(job) + 1));
    }

    function joinNames(names) {
      if (names.length === 1) return names[0];
      if (names.length === 2) return names[0] + ' and ' + names[1];
      return names.slice(0, -1).join(', ') + ' and ' + names[names.length - 1];
    }

    function gbp(n) {
      const hasPence = n % 1 !== 0;
      return '£' + n.toLocaleString('en-GB', {
        minimumFractionDigits: hasPence ? 2 : 0,
        maximumFractionDigits: hasPence ? 2 : 0
      });
    }

    function render() {
      const list    = document.getElementById('jobs-list');
      const calcBtn = document.getElementById('calc-btn');

      if (jobs.length === 0) {
        list.innerHTML = '<p class="empty-state">No jobs added yet — use the form above to add your first.</p>';
        calcBtn.hidden = true;
        return;
      }

      list.innerHTML = jobs.map((job, i) => {
        if (job.id === editingId) {
          return `
            <div class="job-card job-card--editing">
              <div class="job-card-body">
                <div class="form-row">
                  <label>Job name (optional)<input class="edit-name" type="text" value="${job.name}" placeholder="e.g. Company or Title"></label>
                </div>
                <div class="form-row">
                  <label>Gross pay (£)<input class="edit-gross" type="number" min="0" value="${job.grossPay}" placeholder="7500"></label>
                  <label>Tax deducted (£)<input class="edit-tax" type="number" min="0" value="${job.taxDeducted}" placeholder="870"></label>
                  <label>Tax code<input class="edit-code" type="text" value="${job.taxCode}" placeholder="1257L"></label>
                </div>
                <p class="edit-error form-error" hidden aria-live="polite"></p>
              </div>
              <div class="job-actions">
                <button class="btn-save" onclick="saveJob('${job.id}')">Save</button>
                <button class="remove-btn" onclick="cancelEdit()">Cancel</button>
              </div>
            </div>
          `;
        }
        return `
          <div class="job-card">
            <div class="job-card-body">
              <p class="job-name">${job.name || 'Job ' + (i + 1)}</p>
              <div class="job-fields">
                <span class="job-field">
                  <span class="field-label">Gross pay</span>
                  <span>${gbp(job.grossPay)}</span>
                </span>
                <span class="job-field">
                  <span class="field-label">Tax deducted</span>
                  <span>${gbp(job.taxDeducted)}</span>
                </span>
                <span class="job-field">
                  <span class="field-label">Tax code</span>
                  <span>${job.taxCode || '—'}</span>
                </span>
              </div>
            </div>
            <div class="job-actions">
              <button class="edit-btn" onclick="editJob('${job.id}')">Edit</button>
              <button class="remove-btn" onclick="removeJob('${job.id}')">Remove</button>
            </div>
          </div>
        `;
      }).join('');

      calcBtn.hidden = false;
    }

    function addJob() {
      const nameInput  = document.getElementById('draft-name');
      const grossInput = document.getElementById('draft-gross');
      const taxInput   = document.getElementById('draft-tax');
      const codeInput  = document.getElementById('draft-code');
      const errorEl    = document.getElementById('form-error');

      const grossPay = Number(grossInput.value);

      if (!grossInput.value || grossPay <= 0) {
        errorEl.textContent = 'Enter a gross pay amount greater than £0.';
        errorEl.hidden = false;
        grossInput.focus();
        return;
      }

      errorEl.hidden = true;
      jobs.push({
        id:          generateId(),
        name:        nameInput.value.trim(),
        grossPay:    grossPay,
        taxDeducted: Number(taxInput.value) || 0,
        taxCode:     codeInput.value.trim()
      });

      nameInput.value  = '';
      grossInput.value = '';
      taxInput.value   = '';
      codeInput.value  = '';
      nameInput.focus();
      render();
    }

    function editJob(id) {
      editingId = id;
      render();
      const first = document.querySelector('.edit-name');
      if (first) first.focus();
    }

    function saveJob(id) {
      const grossInput = document.querySelector('.edit-gross');
      const errorEl    = document.querySelector('.edit-error');
      const grossPay   = Number(grossInput.value);

      if (!grossInput.value || grossPay <= 0) {
        errorEl.textContent = 'Enter a gross pay amount greater than £0.';
        errorEl.hidden = false;
        grossInput.focus();
        return;
      }

      jobs = jobs.map(j => j.id === id ? {
        ...j,
        name:        document.querySelector('.edit-name').value.trim(),
        grossPay:    grossPay,
        taxDeducted: Number(document.querySelector('.edit-tax').value) || 0,
        taxCode:     document.querySelector('.edit-code').value.trim()
      } : j);

      editingId = null;
      render();
    }

    function cancelEdit() {
      editingId = null;
      render();
    }

    function removeJob(id) {
      if (editingId === id) editingId = null;
      jobs = jobs.filter(j => j.id !== id);
      render();
    }

    function calculate() {
      const resultEl = document.getElementById('result');

      if (jobs.length === 0) {
        resultEl.textContent = 'Add at least one job first.';
        return;
      }

      const { totalIncome, totalDeducted, due, difference } = checkTax(jobs);

      let verdict;
      if (difference > 0) {
        verdict = `You likely overpaid ${gbp(difference)} — you may be owed a refund.`;
      } else if (difference < 0) {
        verdict = `You may have underpaid ${gbp(Math.abs(difference))} — worth checking before HMRC does.`;
      } else {
        verdict = 'It looks like you paid exactly the right amount of tax.';
      }

      const reasons = [];

      const taxedUnderAllowance = jobs.filter(j => j.taxCode.toUpperCase() !== '1257L');
      if (totalIncome < TAX_YEAR.personalAllowance && taxedUnderAllowance.length > 0) {
        const names = joinNames(taxedUnderAllowance.map(j => jobLabel(j)));
        reasons.push(`Your total income is below the £12,570 tax-free allowance, but ${names} deducted tax anyway (via a BR or emergency code). That tax is likely reclaimable.`);
      }

      const emergencyJobs = jobs.filter(j => /W1|M1/i.test(j.taxCode));
      if (emergencyJobs.length > 0) {
        const names = joinNames(emergencyJobs.map(j => jobLabel(j)));
        reasons.push(`${names} used an emergency tax code (W1 or M1). These tax each pay period in isolation and often over-deduct if you didn't work the full year.`);
      }

      const brJobs = jobs.filter(j => j.taxCode.toUpperCase() === 'BR');
      if (brJobs.length > 0) {
        const names = joinNames(brJobs.map(j => jobLabel(j)));
        reasons.push(`${names} used a BR code, which taxes every pound at 20% with no personal allowance. This is only correct if another job already uses your full allowance — if your total income is below £12,570, it's too much.`);
      }

      const reasonsHtml = reasons.length > 0
        ? '<ul>' + reasons.map(r => `<li>${r}</li>`).join('') + '</ul>'
        : '';

      const colourClass = difference > 0 ? 'green' : difference < 0 ? 'amber' : 'neutral';
      const label       = difference > 0 ? 'Estimated overpayment' : difference < 0 ? 'Estimated underpayment' : 'Estimated balance';

      resultEl.innerHTML = `
        <div class="result-card ${colourClass}">
          <p class="result-label">${label}</p>
          <hr>
          <p class="result-figure">${gbp(Math.abs(difference))}</p>
          <p class="result-verdict">${verdict}</p>
          <div class="result-breakdown">
            <div class="breakdown-row"><span>Total income</span><span>${gbp(totalIncome)}</span></div>
            <div class="breakdown-row"><span>Tax owed on that income</span><span>${gbp(due)}</span></div>
            <div class="breakdown-row"><span>Tax actually deducted</span><span>${gbp(totalDeducted)}</span></div>
          </div>
          ${reasonsHtml}
          <p class="result-footer">To check or claim a refund, use your <a href="https://www.gov.uk/personal-tax-account" target="_blank">HMRC personal tax account</a> or wait for a P800 letter.</p>
        </div>
      `;
    }

    render();

    document.querySelectorAll('.info-btn').forEach(function(btn) {
      var tip = document.getElementById(btn.getAttribute('aria-describedby'));
      btn.addEventListener('mouseenter', function() { tip.classList.add('show'); });
      btn.addEventListener('mouseleave', function() { tip.classList.remove('show'); });
      btn.addEventListener('focus',      function() { tip.classList.add('show'); });
      btn.addEventListener('blur',       function() { tip.classList.remove('show'); });
    });
  </script>
</body>
</html>
